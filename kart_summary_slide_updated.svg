<svg width="1568" height="882" viewBox="0 0 1568 882" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1568" y2="882" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2E68"/>
      <stop offset="0.42" stop-color="#0B1328"/>
      <stop offset="1" stop-color="#0A1020"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 840) rotate(90) scale(180 310)">
      <stop stop-color="#2DD4BF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title { font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif; font-weight: 800; fill: #F8FAFC; }
      .sub { font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif; font-weight: 500; fill: #A7B0C3; }
      .cardTitle { font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif; font-weight: 800; fill: #E8B62C; }
      .cardText { font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif; font-weight: 500; fill: #E5E7EB; }
      .footer { font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif; font-weight: 500; fill: #A3AAB8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1568" height="882" fill="url(#bg)"/>
  <rect x="0" y="0" width="1568" height="882" fill="url(#glow1)"/>

  <!-- Header -->
  <g filter="url(#shadow)">
    <rect x="60" y="44" width="1448" height="118" rx="24" fill="#0C1429" stroke="#384B7A" stroke-width="1.5"/>
    <text x="92" y="98" class="title" font-size="44">카트리그 개인전 결승전 경기 요약·분석 보고서 자동화 LLM 과제</text>
    <text x="92" y="130" class="sub" font-size="20">문제 정의부터 환각 검증까지, 파트별 핵심 설계를 한 장으로 정리</text>
    <line x1="82" y1="149" x2="1508" y2="149" stroke="#E8B62C" stroke-width="2"/>
  </g>

  <!-- Card 1 -->
  <g filter="url(#shadow)">
    <rect x="76" y="194" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="82" y="208" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="104" y="232" class="cardTitle" font-size="24">문제 정의</text>
    <text x="104" y="258" class="cardText" font-size="19">
      <tspan x="104" dy="0">결승전 경기 정보를 정확하고 일관되게 요약·분석하는</tspan>
      <tspan x="104" dy="27">보고서 자동화 체계 필요</tspan>
    </text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#shadow)">
    <rect x="810" y="194" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="816" y="208" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="838" y="232" class="cardTitle" font-size="24">타겟 사용자</text>
    <text x="838" y="258" class="cardText" font-size="19">
      <tspan x="838" dy="0">e스포츠 경기 요약문을 자동화하고 싶은 사용자</tspan>
      <tspan x="838" dy="27">예: 경기 리포트, 기사 초안, 발표 자료 작성자</tspan>
    </text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadow)">
    <rect x="76" y="351" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="82" y="365" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="104" y="389" class="cardTitle" font-size="24">페르소나</text>
    <text x="104" y="415" class="cardText" font-size="19">
      <tspan x="104" dy="0">경기 데이터 분석 편집자</tspan>
      <tspan x="104" dy="27">짧은 시간 안에 결과를 검수하고 문장을 다듬는 역할</tspan>
    </text>
  </g>

  <!-- Card 4 -->
  <g filter="url(#shadow)">
    <rect x="810" y="351" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="816" y="365" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="838" y="389" class="cardTitle" font-size="24">시스템 프롬프트 초안</text>
    <text x="838" y="415" class="cardText" font-size="19">
      <tspan x="838" dy="0">역할, 출력 형식, 근거 우선 원칙, 환각 방지 규칙을</tspan>
      <tspan x="838" dy="27">명확하게 지정</tspan>
    </text>
  </g>

  <!-- Card 5 -->
  <g filter="url(#shadow)">
    <rect x="76" y="508" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="82" y="522" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="104" y="546" class="cardTitle" font-size="24">유저 프롬프트 설계</text>
    <text x="104" y="572" class="cardText" font-size="19">
      <tspan x="104" dy="0">입력 데이터, 요청 목적, 출력 범위, 제약조건을</tspan>
      <tspan x="104" dy="27">구체적으로 전달</tspan>
    </text>
  </g>

  <!-- Card 6 -->
  <g filter="url(#shadow)">
    <rect x="810" y="508" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="816" y="522" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="838" y="546" class="cardTitle" font-size="24">Few-shot 예시</text>
    <text x="838" y="572" class="cardText" font-size="19">
      <tspan x="838" dy="0">좋은 답변 예시를 제공해 출력 형식과 톤을 안정화</tspan>
      <tspan x="838" dy="27">환각 감소와 품질 일관성 확보</tspan>
    </text>
  </g>

  <!-- Card 7 -->
  <g filter="url(#shadow)">
    <rect x="76" y="665" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="82" y="679" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="104" y="703" class="cardTitle" font-size="24">단계적 추론 유도 / 전·후 비교</text>
    <text x="104" y="729" class="cardText" font-size="19">
      <tspan x="104" dy="0">복잡한 분석은 단계별로 진행하고</tspan>
      <tspan x="104" dy="27">적용 전후 결과 차이를 비교</tspan>
    </text>
  </g>

  <!-- Card 8 -->
  <g filter="url(#shadow)">
    <rect x="810" y="665" width="682" height="133" rx="18" fill="#101A33" stroke="#4D5F88" stroke-width="1.4"/>
    <rect x="816" y="679" width="7" height="104" rx="4" fill="#E8B62C"/>
    <text x="838" y="703" class="cardTitle" font-size="24">환각 검증</text>
    <text x="838" y="729" class="cardText" font-size="19">
      <tspan x="838" dy="0">선수명, 점수, 순위, SET 진출 여부 등</tspan>
      <tspan x="838" dy="27">핵심 사실을 교차 확인</tspan>
    </text>
  </g>

  <!-- Footer -->
  <line x1="72" y1="832" x2="1496" y2="832" stroke="#334155" stroke-width="1"/>
  <text x="76" y="858" class="footer" font-size="15">요약 포인트: 구조화된 프롬프트 + 단계적 추론 + 환각 검증</text>
  <text x="1490" y="858" class="footer" font-size="15" text-anchor="end">Presentation-style summary</text>
</svg>